<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Certificates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --blue:        #3b82f6;
  --blue2:       #60a5fa;
  --blue3:       #93c5fd;
  --blue-dark:   #1d4ed8;
  --blue-deep:   #1e3a5f;
  --navy:        #060d1a;
  --navy2:       #0a1628;
  --surface:     #0d1f3c;
  --surface2:    #122448;
  --border:      rgba(59,130,246,.2);
  --text:        #dbeafe;
  --text-dim:    #4a7bb5;
  --glow:        rgba(59,130,246,.35);
}

html,body{width:100%;overflow-x:hidden;}

body{
  background:var(--navy);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-weight:300;
  min-height:100vh;
}

/* ── BACKGROUND ── */
.bg-layer{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 15% -10%, rgba(29,78,216,.25) 0%,transparent 55%),
    radial-gradient(ellipse 60% 70% at 85% 110%,  rgba(37,99,235,.2)  0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,   rgba(6,13,26,.8)    0%,transparent 75%);
}

/* grid lines */
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  text-align:center;
  padding:clamp(48px,8vw,80px) 20px clamp(32px,5vw,52px);
}

.badge-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(59,130,246,.1);
  border:1px solid rgba(59,130,246,.25);
  border-radius:100px;padding:6px 16px;
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--blue2);margin-bottom:22px;
  opacity:0;animation:fadeUp .6s .1s ease forwards;
}
.badge-pill::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--blue);
  box-shadow:0 0 8px var(--blue);
  animation:pulse 2s ease infinite;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,7vw,3.8rem);
  font-weight:400;line-height:1.1;
  opacity:0;animation:fadeUp .7s .25s ease forwards;
}
h1 span{
  font-style:italic;
  background:linear-gradient(100deg, var(--blue2), var(--blue3), #a5f3fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.sub{
  margin-top:12px;font-size:clamp(13px,2vw,15px);
  color:var(--text-dim);max-width:400px;margin-inline:auto;
  opacity:0;animation:fadeUp .7s .4s ease forwards;
}

/* stats row */
.stats{
  display:flex;justify-content:center;gap:clamp(20px,5vw,48px);
  margin-top:28px;
  opacity:0;animation:fadeUp .7s .55s ease forwards;
}
.stat{text-align:center;}
.stat-n{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,4vw,2.4rem);
  font-weight:700;
  background:linear-gradient(135deg,var(--blue2),var(--blue3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
.stat-l{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-top:3px;}

/* divider */
.divider{
  display:flex;align-items:center;gap:14px;
  max-width:260px;margin:28px auto 0;
  opacity:0;animation:fadeUp .7s .65s ease forwards;
}
.divider span{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border),transparent);}
.divider i{font-style:normal;color:var(--blue);font-size:12px;}

/* ── CAROUSEL SECTION ── */
.carousel-section{
  position:relative;z-index:5;
  padding:clamp(28px,5vw,48px) 0 clamp(40px,7vw,70px);
  overflow:hidden;
}

/* fade edges */
.carousel-section::before,
.carousel-section::after{
  content:'';
  position:absolute;top:0;bottom:0;width:clamp(40px,8vw,120px);z-index:10;pointer-events:none;
}
.carousel-section::before{left:0;background:linear-gradient(to right,var(--navy),transparent);}
.carousel-section::after{right:0;background:linear-gradient(to left,var(--navy),transparent);}

/* ── Track ── */
.track-wrap{overflow:hidden;width:100%;}

.track{
  display:flex;
  width:max-content;
  animation:scroll 38s linear infinite;
  gap:20px;
  padding:12px 0 20px;
}
.track:hover{animation-play-state:paused;}

/* Duplicate for seamless loop */
.track .set{display:flex;gap:20px;}

/* ── CARD ── */
.card{
  flex:0 0 clamp(240px,70vw,320px);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .35s cubic-bezier(.22,1,.36,1),
             box-shadow .3s ease,border-color .3s;
  position:relative;
}
.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 24px 60px rgba(0,0,0,.5),
             0 0 0 1px rgba(59,130,246,.45),
             0 0 40px rgba(37,99,235,.18);
  border-color:rgba(59,130,246,.5);
}

/* shine */
.card::before{
  content:'';position:absolute;inset:0;z-index:5;
  background:linear-gradient(110deg,transparent 30%,rgba(147,197,253,.07) 50%,transparent 70%);
  transform:translateX(-100%);
  transition:transform .6s ease;pointer-events:none;
}
.card:hover::before{transform:translateX(100%);}

/* top glow line */
.card::after{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;z-index:6;
  background:linear-gradient(90deg,transparent,var(--blue),var(--blue2),transparent);
  opacity:0;transition:opacity .3s;
}
.card:hover::after{opacity:1;}

/* Image */
.img-wrap{
  position:relative;width:100%;padding-top:66%;
  background:var(--surface2);overflow:hidden;
}
.img-wrap img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
  transition:transform .5s cubic-bezier(.22,1,.36,1),filter .4s;
  filter:brightness(.85) saturate(.8);
}
.card:hover .img-wrap img{transform:scale(1.07);filter:brightness(1.05) saturate(1.15);}

.img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 50%,rgba(6,13,26,.9) 100%);
  pointer-events:none;
}

.num-tag{
  position:absolute;top:12px;left:12px;z-index:3;
  width:28px;height:28px;border-radius:50%;
  background:rgba(29,78,216,.8);backdrop-filter:blur(6px);
  border:1px solid rgba(96,165,250,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;color:var(--blue3);
}
.cert-badge{
  position:absolute;top:12px;right:12px;z-index:3;
  background:rgba(6,13,26,.75);backdrop-filter:blur(8px);
  border:1px solid rgba(59,130,246,.3);border-radius:20px;
  padding:3px 10px;font-size:9px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--blue2);
}

/* Card body */
.card-body{padding:16px 18px 18px;}
.card-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(.95rem,2.5vw,1.05rem);
  font-weight:400;color:var(--text);
  line-height:1.35;margin-bottom:6px;
}
.card-org{
  font-size:11px;color:var(--blue);
  letter-spacing:.06em;margin-bottom:12px;
}

/* animated bar */
.bar-wrap{width:100%;height:2px;background:rgba(59,130,246,.1);border-radius:2px;overflow:hidden;margin-bottom:14px;}
.bar-fill{
  height:100%;width:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--blue-dark),var(--blue2),#a5f3fc);
  background-size:200% 100%;
  animation:barShimmer 3s linear infinite;
}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:12px;border-top:1px solid rgba(59,130,246,.07);
}
.view-btn{
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--blue2);cursor:pointer;
  display:flex;align-items:center;gap:4px;transition:gap .2s,color .2s;
}
.card:hover .view-btn{gap:8px;color:var(--blue3);}
.yr{
  font-size:10px;color:var(--text-dim);
  background:rgba(59,130,246,.08);
  padding:2px 8px;border-radius:4px;
}

/* ── SECOND ROW (reverse) ── */
.track.rev{animation-direction:reverse;animation-duration:42s;}

/* row label */
.row-label{
  text-align:center;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:10px;
  opacity:.6;
}

/* ── LIGHTBOX ── */
.lb{
  position:fixed;inset:0;z-index:200;
  background:rgba(4,9,20,.95);backdrop-filter:blur(24px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;
}
.lb.open{opacity:1;visibility:visible;}

.lb-box{
  position:relative;max-width:860px;width:100%;
  transform:scale(.87) translateY(18px);
  transition:transform .4s cubic-bezier(.22,1,.36,1);
}
.lb.open .lb-box{transform:scale(1) translateY(0);}

.lb-img{
  width:100%;border-radius:14px;display:block;
  box-shadow:0 30px 80px rgba(0,0,0,.7),
             0 0 0 1px rgba(59,130,246,.2),
             0 0 60px rgba(29,78,216,.15);
}
.lb-close{
  position:absolute;top:-12px;right:-12px;
  width:32px;height:32px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--blue2);font-size:15px;line-height:30px;
  text-align:center;cursor:pointer;transition:all .2s;
}
.lb-close:hover{background:rgba(59,130,246,.2);transform:scale(1.1);}

.lb-info{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:14px;padding:0 2px;
}
.lb-title{
  font-family:'Playfair Display',serif;
  font-size:1rem;color:var(--blue3);
}
.lb-count{font-size:11px;color:var(--text-dim);}

.lb-nav{display:flex;justify-content:center;gap:10px;margin-top:14px;}
.lb-nav button{
  background:var(--surface2);border:1px solid rgba(59,130,246,.25);
  color:var(--blue2);padding:8px 22px;border-radius:8px;
  font-size:12px;font-family:'Outfit',sans-serif;
  cursor:pointer;transition:all .2s;
}
.lb-nav button:hover{background:rgba(59,130,246,.15);border-color:var(--blue);}

/* ── FOOTER ── */
footer{
  position:relative;z-index:5;
  text-align:center;padding:24px;
  font-size:11px;color:var(--text-dim);letter-spacing:.08em;
  border-top:1px solid var(--border);
}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@keyframes pulse{
  0%,100%{box-shadow:0 0 4px var(--blue);}
  50%{box-shadow:0 0 12px var(--blue),0 0 20px var(--blue);}
}

@keyframes scroll{
  0%  {transform:translateX(0);}
  100%{transform:translateX(-50%);}
}

@keyframes barShimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .card{flex:0 0 78vw;}
  .lb-nav button{padding:7px 16px;}
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>

<!-- ── HEADER ── -->
<header>
  <div class="badge-pill">Professional Credentials</div>
  <h1>My <span>Certificates</span></h1>
  <p class="sub">Verified achievements earned through dedication and continuous learning.</p>
  <div class="stats">
    <div class="stat"><div class="stat-n">10</div><div class="stat-l">Certificates</div></div>
    <div class="stat"><div class="stat-n">100%</div><div class="stat-l">Verified</div></div>
    <div class="stat"><div class="stat-n">∞</div><div class="stat-l">Learning</div></div>
  </div>
  <div class="divider"><span></span><i>✦</i><span></span></div>
</header>

<!-- ── ROW 1: forward loop ── -->
<section class="carousel-section">
  <p class="row-label">All Certificates</p>
  <div class="track-wrap">
    <div class="track" id="track1">
      <!-- Set A -->
      <div class="set" id="setA"></div>
      <!-- Set B (clone for seamless loop) -->
      <div class="set" id="setB"></div>
    </div>
  </div>
</section>

<!-- ── ROW 2: reverse loop ── -->
<section class="carousel-section" style="padding-top:0">
  <div class="track-wrap">
    <div class="track rev" id="track2">
      <div class="set" id="setC"></div>
      <div class="set" id="setD"></div>
    </div>
  </div>
</section>

<!-- ── LIGHTBOX ── -->
<div class="lb" id="lb" onclick="lbOverlay(event)">
  <div class="lb-box">
    <div class="lb-close" onclick="closeLb()">✕</div>
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-info">
      <span class="lb-title" id="lbTitle"></span>
      <span class="lb-count" id="lbCount"></span>
    </div>
    <div class="lb-nav">
      <button onclick="moveLb(-1)">&#8592; Prev</button>
      <button onclick="moveLb(+1)">Next &#8594;</button>
    </div>
  </div>
</div>

<footer>&copy; 2025 &nbsp;·&nbsp; All certificates are authentic verified credentials</footer>

<script>
const certs = [
  { id:"1xZMXTCHjGB5v1OwXCwP1HvyeEUyyy4Lj", title:"Certificate of Achievement", org:"Issuing Organization", year:"2024" },
  { id:"1Gy6dZ_Fmq39ZdjC6J_4GGKiAZcuB0wQj", title:"Certificate of Achievement", org:"Issuing Organization", year:"2024" },
  { id:"1TXNPJ7lqyHG8ek69s-op9_fG7ZubCDge", title:"Certificate of Achievement", org:"Issuing Organization", year:"2024" },
  { id:"1Ug0fZpw1OkttQjqOUPlC6xNz_JZm3LLM", title:"Certificate of Achievement", org:"Issuing Organization", year:"2024" },
  { id:"1CZi4x48ge6X-P57EXbUnPrxO9b4ZKHvR", title:"Certificate of Achievement", org:"Issuing Organization", year:"2023" },
  { id:"1U7srPj5GmQf55USyKdIQ-F1YvD0dyQHx", title:"Certificate of Achievement", org:"Issuing Organization", year:"2023" },
  { id:"1Ix-OcrgHDtXqauc0qNCQ7kD5629pvTlm", title:"Certificate of Achievement", org:"Issuing Organization", year:"2023" },
  { id:"1AkMm7Y0A-Z1KRU-6pKpdrDvHsY54jTzN", title:"Certificate of Achievement", org:"Issuing Organization", year:"2023" },
  { id:"1PMEH631nPGuHBvHiEKeDMX3l8g_zB9fz", title:"Certificate of Achievement", org:"Issuing Organization", year:"2022" },
  { id:"1FiVQ0m5mUwGK8GyKOQNSisSg5XL1zy6V", title:"Certificate of Achievement", org:"Issuing Organization", year:"2022" },
];

function imgUrl(id){ return `https://drive.google.com/thumbnail?id=${id}&sz=w800`; }

function makeCard(cert, idx){
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `
    <div class="img-wrap">
      <img src="${imgUrl(cert.id)}" alt="${cert.title}" loading="lazy">
      <span class="num-tag">${String(idx+1).padStart(2,'0')}</span>
      <span class="cert-badge">Certified</span>
    </div>
    <div class="card-body">
      <h2 class="card-title">${cert.title}</h2>
      <p class="card-org">${cert.org}</p>
      <div class="bar-wrap"><div class="bar-fill"></div></div>
      <div class="card-footer">
        <span class="view-btn">View full &#8594;</span>
        <span class="yr">${cert.year}</span>
      </div>
    </div>`;
  d.addEventListener('click', () => openLb(idx));
  return d;
}

// Row 1: all 10 certs (forward)
const setA = document.getElementById('setA');
const setB = document.getElementById('setB');
certs.forEach((c,i) => { setA.appendChild(makeCard(c,i)); setB.appendChild(makeCard(c,i)); });

// Row 2: reversed order
const setC = document.getElementById('setC');
const setD = document.getElementById('setD');
[...certs].reverse().forEach((c,i) => {
  const origIdx = certs.length-1-i;
  setC.appendChild(makeCard(c, origIdx));
  setD.appendChild(makeCard(c, origIdx));
});

/* ── Lightbox ── */
let cur = 0;
const lb    = document.getElementById('lb');
const lbImg = document.getElementById('lbImg');
const lbTit = document.getElementById('lbTitle');
const lbCnt = document.getElementById('lbCount');
lbImg.style.transition = 'opacity .18s';

function openLb(idx){
  cur = idx;
  lbImg.src = imgUrl(certs[idx].id);
  lbTit.textContent = `Certificate ${String(idx+1).padStart(2,'0')}`;
  lbCnt.textContent = `${idx+1} / ${certs.length}`;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb(){ lb.classList.remove('open'); document.body.style.overflow = ''; }
function lbOverlay(e){ if(e.target === lb) closeLb(); }
function moveLb(dir){
  cur = (cur + dir + certs.length) % certs.length;
  lbImg.style.opacity = '0';
  setTimeout(()=>{
    lbImg.src = imgUrl(certs[cur].id);
    lbTit.textContent = `Certificate ${String(cur+1).padStart(2,'0')}`;
    lbCnt.textContent = `${cur+1} / ${certs.length}`;
    lbImg.style.opacity = '1';
  }, 200);
}
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') moveLb(-1);
  if (e.key === 'ArrowRight') moveLb(1);
});

/* ── Touch swipe for lightbox ── */
let touchX = 0;
lb.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
lb.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) moveLb(dx < 0 ? 1 : -1);
});
</script>
</body>
</html>
